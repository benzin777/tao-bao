<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Tao Dao</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <button class="icon-button" id="menuButton" type="button" aria-label="Open pages">
          <span class="menu-glyph" aria-hidden="true">
            <span></span>
            <span></span>
          </span>
        </button>
        <div class="top-actions">
          <button class="top-action-button hint-button" id="hintButton" type="button" aria-label="Open cohesive device hints">
            <span aria-hidden="true">?</span>
          </button>
          <button class="top-action-button reroll-button" id="rerollTaskButton" type="button" aria-label="Randomize pattern">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <form class="input-dock" id="inputForm">
        <button class="mode-button" id="modeButton" type="button" aria-label="Open mode controls">
          <span aria-hidden="true">⚙</span>
        </button>
        <label class="composer-shell">
          <span class="sr-only">Write your sentence</span>
          <textarea id="composer" rows="1" placeholder="Write your sentence..."></textarea>
        </label>
        <button class="send-button" id="sendButton" type="submit" aria-label="Send sentence">
          <span aria-hidden="true">↑</span>
        </button>
      </form>
    </div>

    <aside class="drawer drawer-left" id="pageDrawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <strong>Pages</strong>
          <span>Course material</span>
        </div>
        <button class="icon-button subtle" id="closePageDrawer" type="button" aria-label="Close pages">×</button>
      </div>
      <nav class="page-list">
        <button class="page-row active" type="button" data-page="structure-course">
          <strong>Structure course</strong>
          <span>How relation stacks work</span>
        </button>
        <button class="page-row" type="button" data-page="level-map">
          <strong>Level map</strong>
          <span>Level 1, 2, and 3</span>
        </button>
        <button class="page-row" type="button" data-page="connectors">
          <strong>Connector sheet</strong>
          <span>Cause, result, contrast</span>
        </button>
        <button class="page-row" type="button" data-page="future-lessons">
          <strong>Future lessons</strong>
          <span>Prepositions and tenses later</span>
        </button>
      </nav>
    </aside>

    <section class="page-reader" id="pageReader" aria-hidden="true" aria-labelledby="readerTitle" inert>
      <header class="reader-topbar">
        <button class="icon-button subtle" id="readerBackButton" type="button" aria-label="Back to pages">
          <span class="menu-glyph" aria-hidden="true">
            <span></span>
            <span></span>
          </span>
        </button>
        <div>
          <span id="readerEyebrow">Course page</span>
          <h1 id="readerTitle">Structure course</h1>
        </div>
        <button class="icon-button subtle" id="closeReaderButton" type="button" aria-label="Close page">×</button>
      </header>
      <article class="reader-scroll">
        <p class="reader-summary" id="readerSummary"></p>
        <div class="reader-meta" id="readerMeta"></div>
        <div class="reader-body" id="readerBody"></div>
      </article>
    </section>

    <section class="mode-sheet" id="modeSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <strong>Mode</strong>
          <span>Choose what the chat should train</span>
        </div>
        <button class="icon-button subtle" id="closeModeSheet" type="button" aria-label="Close mode controls">×</button>
      </div>

      <div class="control-group">
        <label>Lesson</label>
        <div class="lesson-pill">
          <strong>Structure</strong>
          <span>Sentence logic and relation stacking</span>
        </div>
      </div>

      <div class="control-group">
        <label>Level</label>
        <div class="segmented" data-field="level">
          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
        </div>
      </div>

      <div class="control-group">
        <label>Support</label>
        <div class="segmented" data-field="support">
          <button type="button" data-value="easy">Easy</button>
          <button type="button" data-value="normal">Normal</button>
          <button type="button" data-value="hard">Hard</button>
        </div>
      </div>

      <div class="mode-preview" id="modePreview"></div>

      <button class="start-button" id="startTaskButton" type="button">Start task</button>
    </section>

    <section class="mode-sheet hint-sheet" id="hintSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <strong>Hint</strong>
          <span>Cohesive devices by job</span>
        </div>
        <button class="icon-button subtle" id="closeHintSheet" type="button" aria-label="Close hints">×</button>
      </div>

      <div class="hint-current" id="hintCurrent"></div>
      <div class="device-grid" id="deviceGroups"></div>
    </section>

    <div class="scrim" id="scrim" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
