<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Tao Dao</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <button class="icon-button" id="menuButton" type="button" aria-label="Open pages">
          <span aria-hidden="true">☰</span>
        </button>
        <div class="session-title">
          <strong>Tao Dao</strong>
          <span id="sessionSubtitle">Structure · Level 1 · Easy</span>
        </div>
        <div class="api-pill" id="apiPill">API</div>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <form class="input-dock" id="inputForm">
        <button class="plus-button" id="modeButton" type="button" aria-label="Open mode controls">
          <span aria-hidden="true">+</span>
        </button>
        <label class="composer-shell">
          <span class="sr-only">Write your sentence</span>
          <textarea id="composer" rows="1" placeholder="Write your sentence..."></textarea>
        </label>
        <button class="send-button" id="sendButton" type="submit" aria-label="Send sentence">
          <span aria-hidden="true">↑</span>
        </button>
      </form>
    </div>

    <aside class="drawer drawer-left" id="pageDrawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <strong>Pages</strong>
          <span>Writing spaces</span>
        </div>
        <button class="icon-button subtle" id="closePageDrawer" type="button" aria-label="Close pages">×</button>
      </div>
      <nav class="page-list">
        <button class="page-row active" type="button">
          <strong>Current session</strong>
          <span>Structure drills</span>
        </button>
        <button class="page-row" type="button">
          <strong>Free writing</strong>
          <span>Draft anything</span>
        </button>
        <button class="page-row" type="button">
          <strong>Formula notes</strong>
          <span>Connectors and examples</span>
        </button>
      </nav>
    </aside>

    <section class="mode-sheet" id="modeSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <strong>Mode</strong>
          <span>Structure practice</span>
        </div>
        <button class="icon-button subtle" id="closeModeSheet" type="button" aria-label="Close mode controls">×</button>
      </div>

      <div class="control-group">
        <label>Level</label>
        <div class="segmented" data-field="level">
          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
        </div>
      </div>

      <div class="control-group">
        <label>Support</label>
        <div class="segmented" data-field="support">
          <button type="button" data-value="easy">Easy</button>
          <button type="button" data-value="normal">Normal</button>
          <button type="button" data-value="hard">Hard</button>
        </div>
      </div>

      <div class="control-row">
        <div class="control-group compact">
          <label for="quantitySelect">Quantity</label>
          <select id="quantitySelect">
            <option value="1">1</option>
            <option value="3">3</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="control-group compact">
          <label for="variantSelect">Variant</label>
          <select id="variantSelect">
            <option value="neutral">Neutral</option>
            <option value="formal">Formal</option>
            <option value="academic">Academic</option>
            <option value="creative">Creative</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label for="formulaSelect">Formula</label>
        <select id="formulaSelect"></select>
      </div>

      <div class="formula-preview" id="formulaPreview"></div>

      <button class="start-button" id="startTaskButton" type="button">Start task</button>
    </section>

    <div class="scrim" id="scrim" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
